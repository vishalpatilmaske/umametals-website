<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d22"/>
      <stop offset="100%" stop-color="#0f1114"/>
    </linearGradient>
    <linearGradient id="metal1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="30%" stop-color="#718096"/>
      <stop offset="50%" stop-color="#a0aec0"/>
      <stop offset="70%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="50%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4c47"/>
      <stop offset="100%" stop-color="#1a6b63"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <g transform="translate(120, 80)">
    <rect x="0" y="60" width="280" height="200" rx="4" fill="url(#metal1)" filter="url(#shadow)"/>
    <rect x="8" y="68" width="264" height="184" rx="2" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <path d="M320 160 L320 80 L420 80 L420 120 L380 120 L380 200 L340 200 L340 160 Z" fill="url(#metal2)" filter="url(#shadow)"/>
    <circle cx="520" cy="200" r="70" fill="none" stroke="url(#metal1)" stroke-width="18" filter="url(#shadow)"/>
    <circle cx="520" cy="200" r="45" fill="#1a1d22"/>
    <rect x="580" y="100" width="120" height="40" rx="3" fill="url(#metal2)" filter="url(#shadow)"/>
    <rect x="600" y="85" width="20" height="70" rx="2" fill="url(#metal1)"/>
    <rect x="660" y="85" width="20" height="70" rx="2" fill="url(#metal1)"/>
    <line x1="20" y1="280" x2="260" y2="280" stroke="#b87333" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="290" x2="180" y2="290" stroke="#b87333" stroke-width="0.5" opacity="0.4"/>
    <rect x="40" y="320" width="160" height="4" fill="url(#teal)"/>
    <text x="40" y="360" font-family="monospace" font-size="11" fill="#718096" letter-spacing="0.1em">PRECISION � 0.1mm</text>
  </g>
  <g opacity="0.3" stroke="#b87333" stroke-width="0.8">
    <line x1="60" y1="40" x2="60" y2="80"/><line x1="40" y1="60" x2="80" y2="60"/>
    <line x1="740" y1="520" x2="740" y2="560"/><line x1="720" y1="540" x2="760" y2="540"/>
  </g>
